name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install package with dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,epub]"
      - name: Run pytest
        run: python -m pytest tests/ -v
