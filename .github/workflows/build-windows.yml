name: Build Windows Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ".[all]"
          pip install pyinstaller

      - name: Download ffmpeg
        shell: bash
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          unzip -j ffmpeg.zip "*/bin/ffmpeg.exe" "*/bin/ffprobe.exe" -d ffmpeg_bin/
          ls -la ffmpeg_bin/

      # Build ZipExtractor.exe from ravibpatel/AutoUpdater.NET (MIT). It's
      # the self-update helper used here and by Libation: waits for our
      # PID via Process.WaitForExit, extracts the update zip over the
      # install, uses Windows Restart Manager to diagnose locked files,
      # and relaunches. Target framework is net45 — preinstalled on every
      # Windows 8+ machine, so no .NET runtime install for users.
      #
      # Uses VS MSBuild, not `dotnet build`: .NET SDK 10's resource
      # pipeline errors out on net45 WinForms .resx files containing
      # non-string resources (MSB3823 / MSB3822). MSBuild from VS
      # handles the legacy Framework path correctly.
      - uses: microsoft/setup-msbuild@v2
      - name: Build ZipExtractor.exe
        shell: pwsh
        run: |
          $tag = 'v1.9.2'
          git clone --depth 1 --branch $tag https://github.com/ravibpatel/AutoUpdater.NET.git zipextractor_src
          # The csproj targets net45, but windows-latest runners only
          # ship targeting packs for current .NET Framework versions
          # (4.7.2 / 4.8). Retarget to net48 — shipped with Windows 10
          # 1803+ (May 2019), i.e. every supported Windows version.
          $csproj = 'zipextractor_src/ZipExtractor/ZipExtractor.csproj'
          (Get-Content $csproj) `
            -replace '<TargetFramework>net45</TargetFramework>', '<TargetFramework>net48</TargetFramework>' `
            | Set-Content $csproj
          msbuild $csproj /p:Configuration=Release /v:minimal
          New-Item -ItemType Directory -Force -Path zipextractor_bin | Out-Null
          Copy-Item zipextractor_src/AutoUpdater.NET/Resources/ZipExtractor.exe zipextractor_bin/
          Get-ChildItem zipextractor_bin/

      # --onedir (not --onefile) — produces dist\ffn-dl\ with the exe +
      # _internal\ next to it. That folder is what we zip up and ship.
      # Portable install layout: users unzip the archive anywhere, all
      # runtime data (settings, cache, neural deps) lives in the same
      # folder as the exe.
      - name: Build executable
        shell: bash
        run: |
          pyinstaller --onedir --name ffn-dl --console \
            --add-binary "ffmpeg_bin/ffmpeg.exe;." \
            --add-binary "ffmpeg_bin/ffprobe.exe;." \
            --hidden-import ffn_dl.cli \
            --hidden-import ffn_dl.scraper \
            --hidden-import ffn_dl.ficwad \
            --hidden-import ffn_dl.ao3 \
            --hidden-import ffn_dl.royalroad \
            --hidden-import ffn_dl.mediaminer \
            --hidden-import ffn_dl.literotica \
            --hidden-import ffn_dl.exporters \
            --hidden-import ffn_dl.updater \
            --hidden-import ffn_dl.models \
            --hidden-import ffn_dl.tts \
            --hidden-import ffn_dl.gui \
            --hidden-import ffn_dl.mailer \
            --hidden-import ffn_dl.prefs \
            --hidden-import ffn_dl.portable \
            --hidden-import ffn_dl.neural_env \
            --hidden-import ffn_dl.attribution \
            --hidden-import ffn_dl.self_update \
            --hidden-import ffn_dl.search \
            --hidden-import edge_tts \
            --hidden-import ebooklib \
            --hidden-import curl_cffi \
            --hidden-import wx \
            --collect-all curl_cffi \
            --collect-all wx \
            ffn_dl/__main__.py

      - name: Smoke-test executable
        run: dist\ffn-dl\ffn-dl.exe --help

      # Drop the update helper alongside ffn-dl.exe so the auto-updater
      # in ffn_dl/self_update.py can copy it to %TEMP% and spawn it.
      - name: Bundle ZipExtractor.exe
        shell: pwsh
        run: Copy-Item zipextractor_bin/ZipExtractor.exe dist/ffn-dl/

      # Pack the whole dist\ffn-dl\ folder into a zip the user can
      # unpack anywhere. Compress-Archive with a trailing path segment
      # keeps "ffn-dl" as the top-level folder inside the archive.
      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\ffn-dl -DestinationPath dist\ffn-dl-portable.zip -Force
          Get-ChildItem dist\ffn-dl-portable.zip | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffn-dl-windows-portable
          path: dist/ffn-dl-portable.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ffn-dl-portable.zip
